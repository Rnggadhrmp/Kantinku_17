name: DevSecOps Quality & Security Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  quality-check:
    name: Lint & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode sumber
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install
        working-directory: food-order-app

      - name: Jalankan ESLint
        run: npx eslint src/ --ext .js,.jsx --max-warnings 10
        working-directory: food-order-app

      - name: Jalankan Unit Tests
        run: npx jest --coverage --watchAll=false --coverageReporters=lcov
        working-directory: food-order-app

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: food-order-app/coverage/

  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: Jalankan Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/javascript
            p/react
          auditOn: push

  sca-scan:
    name: SCA (Dependency Check)
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install
        working-directory: food-order-app

      - name: Audit npm dependencies
        run: npm audit --audit-level=high
        working-directory: food-order-app

  sonar-scan:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: food-order-app/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        with:
          projectBaseDir: food-order-app
          args: >
            -Dsonar.projectKey=Rnggadhrmp_Kantinku_17
            -Dsonar.organization=rnggadhrmp
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: sonar-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install & Build
        run: |
          npm install
          npm run build
        working-directory: food-order-app

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: food-order-app/build/
