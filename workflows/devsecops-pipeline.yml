# ============================================================
# .github/workflows/devsecops-pipeline.yml
# Pipeline CI/CD — Quality Gates & DevSecOps
# Mata Kuliah: Pengantar Rekayasa Perangkat Lunak — Bab 11
# ============================================================

name: DevSecOps Quality & Security Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  # ── 1. Lint & Unit Test ─────────────────────────────────────
  quality-check:
    name: Lint & Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode sumber
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Jalankan ESLint (Linting)
        run: npx eslint src/ --ext .js,.jsx --max-warnings 0

      - name: Jalankan Unit Tests
        run: npx jest --coverage --coverageThreshold='{"global":{"lines":80,"branches":75}}'

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── 2. SAST — Static Application Security Testing ──────────
  sast-scan:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: Jalankan Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/default
            p/javascript
            p/react
          auditOn: push

  # ── 3. SCA — Software Composition Analysis ─────────────────
  sca-scan:
    name: SCA (Dependency Check)
    runs-on: ubuntu-latest
    needs: quality-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit npm dependencies
        run: npm audit --audit-level=high

      # Jika menggunakan Snyk token (opsional, lebih detail)
      # - name: Jalankan Snyk SCA
      #   uses: snyk/actions/node@master
      #   env:
      #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  # ── 4. SonarCloud Quality Gate ──────────────────────────────
  sonar-scan:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [sast-scan, sca-scan]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Dibutuhkan SonarCloud

      - name: Download Coverage Report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=kantinku-mobile
            -Dsonar.organization=kampus-rpl
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true

  # ── 5. Build Production ─────────────────────────────────────
  build:
    name: Build Production
    runs-on: ubuntu-latest
    needs: sonar-scan
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: build/
